# AFP client dashboard — https://afp-dashboard.netlify.app/
# Monorepo: Astro app lives in dashboard/. Netlify must build from that folder.

[build]
  base = "dashboard"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # frame-src/media-src allow embedded video over HTTPS. Source/type/delivery
    # of video is intentionally provider-agnostic (TBC) — no host is hard-coded.
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data:; media-src 'self' https:; frame-src 'self' https:; script-src 'self'; style-src 'self' 'unsafe-inline'"

[[redirects]]
  from = "/reports"
  to = "/documents/"
  status = 301

[[redirects]]
  from = "/dashboard/*"
  to = "/documents/:splat"
  status = 301

[[redirects]]
  from = "/report/:id"
  to = "/document/:id/"
  status = 301
